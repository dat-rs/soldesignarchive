<a class="a-module sm grid" style="margin-top: 15px" href="{{ artefact.url }}">
  <div class="a-module-img-holder square">
    {% if artefact.image_count %}<i class="bi bi-images a-module-corner-icon"></i>{% endif %} {% if artefact.published
    == false %}
    <img class="a-module-img" src="/images/non-art/black-square.png" alt="" />
    {% else %}
    <img class="a-module-img" src="/images/sm/sol-{{ artefact.ref_group }}-{{ artefact.ref_id }}-{{ artefact.slug }}-sm.jpg" alt="" />
    {% endif %}
  </div>
  <div class="a-module-content new">
    <h2 class="title au-y">{{ artefact.title }}</h2>
    <span class="a-module-deets author">{{ artefact.author_name | join: ', ' }}</span>
    <span class="a-module-deets year"
      >{% if artefact.circa %}<span class="deet-link year circa">c. </span>{% endif %}{{ artefact.year | remove_first:
      "y" | replace: '-', ' ' }} }}</span
    >
  </div>
</a>
