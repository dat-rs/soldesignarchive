<div class="container-fluid shorts-section">
  <div class="row datum-section short-section top-border">
    <div class="col-12 col-md-2 datum-left-col short-label">
      <h3 class="section-title">Shorts</h3>
      <a class="cta all-posts" href="/pages/blog.html" role="button">See all shorts</a>
    </div>

    {% assign shorts = site.shorts | sample: 3 %} {% for short in shorts %}

    <div class="col-6 col-md-3 col-lg-3 datum-right-col short-col">
      <div class="card blog short">
        <a class="card-link blog" href="{{ short.url }}">
          <div class="blog-img-holder">
            <img class="card-img-top blog" src="/images/blog_posts/{{ short.image }}" alt="{{ short.title }}" />
          </div>
          <div class="card-body blog short index">
            <h2 class="title short preview">{{ short.title }}</h2>
            <p class="post-lead short preview">{{ short.lead }}</p>
          </div>
          <div class="card-footer blog">
            <p class="post-meta preview">{{ short.author }} | {{ short.date | date_to_string }}</p>
          </div>
        </a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
